name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: backend/go.sum

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  backend-postgres:
    name: Go Postgres
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: agenttoolgate
          POSTGRES_USER: agenttoolgate
          POSTGRES_PASSWORD: agenttoolgate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agenttoolgate -d agenttoolgate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      TEST_DATABASE_URL: postgres://agenttoolgate:agenttoolgate@127.0.0.1:5432/agenttoolgate?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: backend/go.sum

      - name: Wait for PostgreSQL
        shell: bash
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if bash -lc 'exec 3<>/dev/tcp/127.0.0.1/5432' >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Test Postgres coverage
        run: go test -count=1 -timeout 60s ./internal/store ./internal/app

  frontend:
    name: Node
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check

      - name: Build
        run: npm run build

  smoke:
    name: 核心 smoke
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    env:
      AGT_DEMO_HTTP_API_KEY: local-demo-secret-for-e2e
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      DEFAULT_WORKSPACE_ORG_ID: local-org
      DEFAULT_WORKSPACE_SLUG: default
      E2E_API_BASE_URL: http://127.0.0.1:8080
      E2E_BASE_URL: http://127.0.0.1:5173
      E2E_BROWSER_CHANNEL: chrome
      E2E_VIDEO: "off"
      HOST: 127.0.0.1
      LOCAL_EMAIL: ci@example.com
      LOCAL_NAME: CI Dev
      LOCAL_ROLE: owner
      LOCAL_SUBJECT: ci-dev
      AUTH_MODE: local
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      POLICY_CONFIG_PATH: ../configs/policies.yaml
      PORT: "8080"
      STORE_DRIVER: memory
      VITE_API_BASE_URL: http://127.0.0.1:8080
      VITE_AUTH_MODE: local
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: backend/go.sum

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装前端依赖
        working-directory: frontend
        run: npm ci

      - name: 启动 backend
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP"
          backend_log="$RUNNER_TEMP/agenttoolgate-backend.log"
          backend_bin="$RUNNER_TEMP/agenttoolgate"
          go build -o "$backend_bin" ./cmd/server
          export AGT_DATA_DIR="$RUNNER_TEMP/agt"
          nohup "$backend_bin" >"$backend_log" 2>&1 &
          echo $! > "$RUNNER_TEMP/agenttoolgate-backend.pid"
          for i in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat "$backend_log" || true
          exit 1
        working-directory: backend

      - name: 启动 frontend
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP"
          frontend_log="$RUNNER_TEMP/agenttoolgate-frontend.log"
          nohup npm run dev -- --host 127.0.0.1 --port 5173 --strictPort >"$frontend_log" 2>&1 &
          echo $! > "$RUNNER_TEMP/agenttoolgate-frontend.pid"
          for i in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:5173 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat "$frontend_log" || true
          exit 1
        working-directory: frontend

      - name: 运行核心 smoke
        working-directory: frontend
        run: npm run e2e -- e2e/smoke.spec.ts

      - name: 运行前端可靠性回归
        working-directory: frontend
        run: npm run e2e -- e2e/frontend-reliability.spec.ts e2e/approval-stream-client.spec.ts

      - name: 失败时上传 Playwright 诊断产物
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
            ${{ runner.temp }}/agenttoolgate-backend.log
            ${{ runner.temp }}/agenttoolgate-frontend.log

      - name: 停止 smoke 服务
        if: always()
        shell: bash
        run: |
          set +e
          for pidfile in "$RUNNER_TEMP/agenttoolgate-backend.pid" "$RUNNER_TEMP/agenttoolgate-frontend.pid"; do
            if [[ -f "$pidfile" ]]; then
              pid="$(cat "$pidfile")"
              pkill -TERM -P "$pid" >/dev/null 2>&1 || true
              kill "$pid" >/dev/null 2>&1 || true
            fi
          done
