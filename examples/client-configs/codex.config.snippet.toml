# 复制到 ~/.codex/config.toml 或交给 ccswitch 管理的项目级片段
[projects."F:/path/to/your/project"]
trust_level = "trusted"

[features]
hooks = true

[mcp_servers.agenttoolgate]
url = "http://127.0.0.1:8080/mcp"

# 可选命令等价参考：codex mcp add agenttoolgate --url http://127.0.0.1:8080/mcp
# 如果需要手动桥接项目级 hook，可指向：agenttoolgate.exe guard hook codex --input -
