services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agenttoolgate
      POSTGRES_PASSWORD: agenttoolgate
      POSTGRES_DB: agenttoolgate
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenttoolgate -d agenttoolgate"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    environment:
      PORT: "8080"
      HOST: 0.0.0.0
      STORE_DRIVER: postgres
      DATABASE_URL: postgres://agenttoolgate:agenttoolgate@postgres:5432/agenttoolgate?sslmode=disable
      DATABASE_QUERY_DATASOURCE: local_postgres
      DATABASE_QUERY_TIMEOUT_MS: "3000"
      DATABASE_QUERY_MAX_ROWS: "100"
      DATABASE_QUERY_ALLOWED_TABLES: public.tools
      GITHUB_TOKEN: ""
      GITHUB_API_BASE_URL: https://api.github.com
      GITHUB_ALLOWED_REPOS: acme/demo
      GITHUB_TIMEOUT_MS: "3000"
      AGT_DEMO_HTTP_API_KEY: ${AGT_DEMO_HTTP_API_KEY:-local-demo-secret-for-e2e}
      HTTP_ALLOWED_HOSTS: localhost:18080,127.0.0.1:18080,host.docker.internal:18080
      HTTP_ALLOWED_METHODS: GET,HEAD,OPTIONS,POST,PUT,PATCH,DELETE
      HTTP_TIMEOUT_MS: "3000"
      HTTP_MAX_RESPONSE_BYTES: "65536"
      POLICY_CONFIG_PATH: /app/configs/policies.yaml
      POLICY_RELOAD_INTERVAL_MS: "5000"
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      AUTH_MODE: local
      DEFAULT_WORKSPACE_NAME: Default Workspace
      DEFAULT_WORKSPACE_SLUG: default
      DEFAULT_WORKSPACE_ORG_ID: local-org
      LOCAL_SUBJECT: local-dev
      LOCAL_EMAIL: dev@agenttoolgate.local
      LOCAL_NAME: Local Developer
      LOCAL_ROLE: owner
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      DEV_MODE: "true"
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./configs:/app/configs:ro

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_AUTH_MODE: local
    ports:
      - "5173:5173"

volumes:
  postgres-data:
